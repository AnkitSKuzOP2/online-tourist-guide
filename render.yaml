services:
  - type: web
    name: travel-api
    runtime: node
    region: singapore
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: NODE_ENV
        value: production
      # Add these manually in Render dashboard (they contain secrets):
      # MONGO_URL
      # JWT_SECRET_KEY
      # FRONTEND_URL
      # GOOGLE_API_KEY
